          localhost: requirements.txt nao encontrado em {{ path_local_app_folder }}/requirements.txt.
          Verifique a copia de arquivos para o servidor local.
      when: not local_requirements_stat.stat.exists

    - name: Create environment using uv [Server]
      ansible.builtin.command:
        cmd: "{{ path_local_uv }} venv {{ path_local_venv }} --python {{ python_version_uv }}"
      args:
        creates: "{{ path_local_venv }}/bin/activate"

    - name: Calculate requirements hash on localhost

        path: "{{ path_local_venv }}/.requirements.sha256"
      register: local_requirements_marker_stat

    - name: Read requirements marker on localhost
      ansible.builtin.slurp:
        path: "{{ path_local_venv }}/.requirements.sha256"
      register: local_requirements_marker
      when: local_requirements_marker_stat.stat.exists

    - name: Define installation need for localhost
      ansible.builtin.set_fact:
        local_requirements_hash: "{{ local_requirements_sha.stdout.split()[0] }}"
        local_requirements_previous_hash: "{{ local_requirements_marker.content | default('') | b64decode | trim }}"

    - name: Report requirements already up to date on localhost
      ansible.builtin.debug:
        msg: "localhost: requirements ja estao atualizados."
      when: local_requirements_hash == local_requirements_previous_hash

    - name: Install requirements [Server] only when changed
      ansible.builtin.command:
        cmd: >-
          {{ path_local_uv }} pip install
          --python {{ path_local_venv }}/bin/python
          -r {{ path_local_app_folder }}/requirements.txt
      when: local_requirements_hash != local_requirements_previous_hash
      environment:
        PATH: "{{ local_dir.stdout }}/.local/bin:{{ ansible_env.PATH }}"
        VIRTUAL_ENV: "{{ path_local_venv }}"

    - name: Update requirements marker on localhost
      ansible.builtin.copy:
        dest: "{{ path_local_venv }}/.requirements.sha256"
        content: "{{ local_requirements_hash }}\n"
        mode: "0644"
      when: local_requirements_hash != local_requirements_previous_hash

    - name: Report requirements installation on localhost
      ansible.builtin.debug:
        msg: "localhost: requirements instalados/atualizados na venv."
      when: local_requirements_hash != local_requirements_previous_hash

        path: "{{ path_local_uv }}"
      register: local_uv_stat

    - name: Fail when uv is missing on localhost
      ansible.builtin.fail:
        msg: >-
          localhost: uv nao encontrado em {{ path_local_uv }}.
          Rode ansible/build.yaml (bootstrap) para instalar dependencias minimas.
      when: not local_uv_stat.stat.exists

    - name: Check requirements.txt on localhost
      ansible.builtin.stat:
